<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bengaluru Traffic Police emblem">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1F6F2A"/>
      <stop offset="1" stop-color="#14501D"/>
    </linearGradient>
    <path id="top" d="M 18,60 A 42,42 0 0 1 102,60" fill="none"/>
    <path id="bot" d="M 102,64 A 42,42 0 0 1 18,64" fill="none"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="58" fill="url(#ring)" stroke="#C9A227" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.8"/>

  <!-- Curved bilingual-style text -->
  <text fill="#E9D89A" font-family="Georgia, 'Times New Roman', serif" font-size="9.5" font-weight="700" letter-spacing="2">
    <textPath href="#top" startOffset="50%" text-anchor="middle">BENGALURU</textPath>
  </text>
  <text fill="#E9D89A" font-family="Georgia, 'Times New Roman', serif" font-size="8.5" font-weight="700" letter-spacing="2.5">
    <textPath href="#bot" startOffset="50%" text-anchor="middle">TRAFFIC POLICE</textPath>
  </text>

  <!-- Side stars -->
  <circle cx="20" cy="62" r="1.6" fill="#C9A227"/>
  <circle cx="100" cy="62" r="1.6" fill="#C9A227"/>

  <!-- Center: traffic signal head -->
  <rect x="49" y="36" width="22" height="44" rx="6" fill="#0E3A16" stroke="#C9A227" stroke-width="1.6"/>
  <circle cx="60" cy="46" r="5.4" fill="#EF4444"/>
  <circle cx="60" cy="58" r="5.4" fill="#EAB308"/>
  <circle cx="60" cy="70" r="5.4" fill="#10B981"/>
  <!-- Signal post -->
  <rect x="58.5" y="80" width="3" height="6" fill="#C9A227"/>
</svg>
